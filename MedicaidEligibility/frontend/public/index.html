
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medicaid Eligibility</title>
    <style>
        body { font-family: sans-serif; margin: 2em; }
        h1, h2 { color: #333; }
        .container { max-width: 800px; margin: 0 auto; }
        .form-section { background: #f4f4f4; padding: 1em; border-radius: 5px; margin-bottom: 1em; }
        textarea, input[type="text"] { width: 100%; padding: 8px; margin-bottom: 10px; border-radius: 4px; border: 1px solid #ccc; }
        button { background: #007bff; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        pre { background: #eee; padding: 1em; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Medicaid Eligibility UI</h1>

        <div class="form-section">
            <h2>Submit Application</h2>
            <textarea id="app-payload" rows="10">{
    "householdId": "12345",
    "state": "NY",
    "people": [
        {
            "personId": "p1",
            "age": 35,
            "income": 15000
        }
    ]
}</textarea>
            <button onclick="submitApplication()">Submit</button>
        </div>

        <div class="form-section">
            <h2>Run SQL Query</h2>
            <textarea id="sql-query" rows="5">SELECT * FROM TDE.medicaid</textarea>
            <button onclick="runSQL()">Run SQL</button>
        </div>

        <div class="form-section">
            <h2>Search</h2>
            <input type="text" id="search-text" placeholder="Search text...">
            <button onclick="search()">Search</button>
        </div>
        
        <div class="form-section">
            <h2>Get Document Detail</h2>
            <input type="text" id="doc-uri" placeholder="Enter document URI (e.g., /input/medicaid/12345.json)">
            <button onclick="getDetail()">Get Detail</button>
        </div>

        <h2>API Response</h2>
        <pre id="response-output">...</pre>
    </div>

    <script>
        const output = document.getElementById('response-output');

        async function submitApplication() {
            const payload = document.getElementById('app-payload').value;
            const response = await fetch('/api/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: payload
            });
            const data = await response.json();
            output.textContent = JSON.stringify(data, null, 2);
        }

        async function runSQL() {
            const query = document.getElementById('sql-query').value;
            const response = await fetch('/api/sql', {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: query
            });
            const data = await response.json();
            output.textContent = JSON.stringify(data, null, 2);
        }

        async function search() {
            const searchText = document.getElementById('search-text').value;
            const response = await fetch('/api/search', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ searchText })
            });
            const data = await response.json();
            output.textContent = JSON.stringify(data, null, 2);
        }

        async function getDetail() {
            const uri = document.getElementById('doc-uri').value;
            const response = await fetch(`/api/detail?uri=${encodeURIComponent(uri)}`);
            const data = await response.json();
            output.textContent = JSON.stringify(data, null, 2);
        }
    </script>
</body>
</html>
